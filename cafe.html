<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Orgánico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0f7a0f;
    --primary-dark: #095b09;
    --earth: #5d4037;
    --bg: #f5f1e8;
    --text: #253125;
    --muted: #5d6a5d;
    --shadow: 0 18px 40px rgba(20, 37, 20, 0.12);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 32px 20px;
    font-family: "Inter", sans-serif;
    line-height: 1.6;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(15, 122, 15, 0.08), transparent 28%),
      radial-gradient(circle at top right, rgba(93, 64, 55, 0.06), transparent 24%),
      var(--bg);
  }

  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem;
    text-align: center;
    background: rgba(255, 255, 255, 0.92);
    border-radius: 24px;
    box-shadow: var(--shadow);
  }

  h1 {
    margin: 0;
    font-family: "Playfair Display", serif;
    color: var(--earth);
    font-size: clamp(2rem, 5vw, 3.5rem);
  }

  .descripcion {
    max-width: 720px;
    margin: 1rem auto 0;
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--muted);
  }

  .galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
    margin-top: 2rem;
  }

  .galeria img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 18px;
    box-shadow: 0 10px 24px rgba(18, 39, 18, 0.12);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 2rem;
    padding: 0.8rem 1.2rem;
    border-radius: 999px;
    background: var(--primary);
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    box-shadow: 0 10px 22px rgba(15, 122, 15, 0.18);
    transition: transform 0.2s ease, background 0.2s ease;
  }

  .btn:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
  }

  @media (max-width: 720px) {
    .page {
      padding: 1.4rem;
    }
  }
</style>
</head>
<body>

<main class="page">
  <h1>Café Orgánico</h1>

  <p class="descripcion">
    Café cultivado de forma artesanal por familias de la vereda.
    Producido con secado natural al sol, sin químicos ni fertilizantes sintéticos.
    Su sabor es limpio, con notas frutales y cuerpo equilibrado.
  </p>

  <div class="galeria">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/45/A_small_cup_of_coffee.JPG" alt="Taza de café">
    <img src="https://educafes.com/wp-content/uploads/2016/07/cafc3a9-de-la-palma.jpg?w=604" alt="Granos de café">
    <img src="https://www.yoamoelcafedecolombia.com/wp-content/uploads/2017/09/1-4.jpg" alt="Cultivo de café">
  </div>

  <a href="index.html" class="btn">Volver</a>
</main>

</body>
</html>
